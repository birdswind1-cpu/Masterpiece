<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | Master Piece Art</title>
    <link rel="stylesheet" href="external.css">
    
    <style>
        /* --- SHARED SYSTEM --- */
        :root {
            --primary: #96c6e3;
            --glass: rgba(255, 255, 255, 0.1);
            --glass-dark: rgba(0, 0, 0, 0.5);
            --glass-border: rgba(255, 255, 255, 0.15);
            --text-white: #ffffff;
            --transition: all 0.3s ease;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            color: var(--text-white);
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), 
                        url("https://img.freepik.com/premium-photo/modern-art-gallery-with-glass-wall-hd-wall-mockup-1920-1080-background_1012843-336.jpg");
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* --- CONTACT FORM SECTION --- */
        .contact-container {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 120px 20px 60px;
        }

        .contact-card {
            background: var(--glass-dark);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            width: 100%;
            max-width: 500px;
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .contact-card h2 {
            font-size: 2rem;
            margin-bottom: 10px;
            text-align: center;
        }

        .contact-card p {
            font-size: 0.9rem;
            opacity: 0.7;
            text-align: center;
            margin-bottom: 30px;
            line-height: 1.5;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--primary);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        input[type="text"], 
        textarea {
            width: 100%;
            padding: 12px 16px;
            border-radius: 12px;
            border: 1px solid var(--glass-border);
            background: rgba(255, 255, 255, 0.05);
            color: white;
            outline: none;
            transition: var(--transition);
            font-size: 1rem;
            font-family: inherit;
        }

        input:focus, textarea:focus {
            background: rgba(255, 255, 255, 0.1);
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(150, 198, 227, 0.2);
        }

        .submit-btn {
            width: 100%;
            padding: 14px;
            border-radius: 12px;
            border: none;
            background: var(--primary);
            color: #000;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: var(--transition);
            margin-top: 10px;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(150, 198, 227, 0.3);
            filter: brightness(1.1);
        }

        .back-home {
            display: block;
            text-align: center;
            margin-top: 20px;
            color: var(--text-white);
            text-decoration: none;
            font-size: 0.85rem;
            opacity: 0.6;
            transition: var(--transition);
        }

        .back-home:hover {
            opacity: 1;
            color: var(--primary);
        }
    </style>
</head>
<body>

    <header class="navbar">
        <a href="index.html" class="logo">Master Piece Arts</a>
        <nav>
            <ul class="nav-links">
                <li><a href="index.html"><span>Home</span></a></li>
        <li><a href="menu.html"><span>Menu</span></a></li>
        <li><a href="gallery.html"><span>Gallery</span></a></li>
        <li><a href="contact.html"><span>Contact</span></a></li>
        <li><a href="login.html" class="active"><span>Login</span></a></li>
            </ul>
        </nav>
    </header>

    <main class="contact-container">
        <div class="contact-card">
            <h2>Contact Us</h2>
            <p>Have questions about our collection? We'd love to hear from you.</p>
            
            <form action="#">
                <div class="form-row">
                    <div class="form-group">
                        <label for="fname">First Name</label>
                        <input type="text" id="fname" placeholder="Mg">
                    </div>
                    <div class="form-group">
                        <label for="lname">Last Name</label>
                        <input type="text" id="lname" placeholder="Mg">
                    </div>
                </div>

                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="text" id="email" placeholder="MgMg@email.com">
                </div>

                <div class="form-group">
                    <label for="comments">Message</label>
                    <textarea id="comments" rows="4" placeholder="How can we help you?"></textarea>
                </div>

                <button type="submit" class="submit-btn">Send Message</button>
            </form>

            <a href="index.html" class="back-home">← Back to Collection</a>
        </div>
    </main>

    <footer>
        &copy; 2026 Master Piece Art | All Rights Reserved
    </footer>

</body>
</html>
