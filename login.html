<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | Master Piece Art</title>
  <link rel="stylesheet" href="external.css">
  <style>
    /* --- SHARED STYLES (Same as Index/Menu) --- */
    :root {
      --primary: #96c6e3;
      --glass: rgba(255, 255, 255, 0.1);
      --glass-dark: rgba(0, 0, 0, 0.45);
      --glass-border: rgba(255, 255, 255, 0.15);
      --text-white: #ffffff;
      --transition: all 0.3s ease;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      color: var(--text-white);
      background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), 
                  url("images/image14.jpg");
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

      /* --- LOGIN BOX --- */
    .login-container {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: center;
      padding-top: 80px; /* Space for navbar */
    }

    #box {
      background: var(--glass-dark);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--glass-border);
      width: 400px;
      padding: 50px 40px;
      border-radius: 24px;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
      text-align: center;
    }

    h2 {
      font-size: 2rem;
      margin-bottom: 8px;
      font-weight: 700;
    }

    .subtitle {
      font-size: 0.9rem;
      opacity: 0.6;
      margin-bottom: 30px;
      display: block;
    }

    form {
      text-align: left;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--primary);
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    input[type="text"], 
    input[type="password"] {
      width: 100%;
      padding: 14px 16px;
      border-radius: 12px;
      border: 1px solid var(--glass-border);
      background: rgba(255, 255, 255, 0.05);
      color: white;
      outline: none;
      margin-bottom: 20px;
      transition: var(--transition);
      font-size: 1rem;
    }

    input:focus {
      background: rgba(255, 255, 255, 0.1);
      border-color: var(--primary);
      box-shadow: 0 0 0 4px rgba(150, 198, 227, 0.2);
    }

    /* --- MODERN BUTTON --- */
    .login-submit {
      width: 100%;
      padding: 14px;
      border-radius: 12px;
      border: none;
      background: var(--primary);
      color: #000;
      font-weight: 700;
      font-size: 1rem;
      cursor: pointer;
      transition: var(--transition);
      margin-top: 10px;
    }

    .login-submit:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(150, 198, 227, 0.3);
      filter: brightness(1.1);
    }
  </style>
</head>
<body>

  <header class="navbar">
    <a class="logo">Master Piece Arts</a>
    <nav>
      <ul class="nav-links">
        <li><a href="index.html"><span>Home</span></a></li>
        <li><a href="menu.html"><span>Menu</span></a></li>
        <li><a href="gallery.html"><span>Gallery</span></a></li>
        <li><a href="contact.html"><span>Contact</span></a></li>
        <li><a href="login.html" class="active"><span>Login</span></a></li>
      </ul>
    </nav>
  </header>

  <main class="login-container">
    <div id="box">
      <h2>Welcome Back</h2>
      <span class="subtitle">Please enter your details</span>

      <form action="index.html">
        <label for="Em">Email Address</label>
        <input type="text" id="Em" name="Em" placeholder="name@email.com" required>

        <label for="pw">Password</label>
        <input type="password" id="pw" name="pw" placeholder="••••••••" required>

        <button type="submit" class="login-submit">Sign In</button>
      </form>

      <div class="form-footer">
        <a href="#">Forgot your password?</a>
        <a href="#">Don't have an account? <strong>Sign up</strong></a>
      </div>
    </div>
  </main>

  <footer>
    &copy; 2026 Master Piece Art | All Rights Reserved
  </footer>

</body>
</html>
